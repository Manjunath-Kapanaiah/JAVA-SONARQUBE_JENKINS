# SonarQube Project Configuration
# This file contains properties for SonarQube analysis

# Project identification
sonar.projectKey=java-jenkins-app
sonar.projectName=Java Jenkins Application
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=src/main/java
sonar.tests=src/test/java

# Binary and test binaries
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Code coverage - JaCoCo
sonar.jacoco.reportPath=target/jacoco.exec
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/test/**,**/target/**

# Code coverage minimum thresholds
sonar.coverage.exclusions=**/test/**

# Issue exclusions (optional)
# sonar.issue.ignore.multicriteria=e1
# sonar.issue.ignore.multicriteria.e1.ruleKey=java:S1186
# sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.java
